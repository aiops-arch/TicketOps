<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Portal | TicketOps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="customer.css" />
  </head>
  <body class="customer-body">
    <div class="portal-shell">
      <div class="portal-ambient" aria-hidden="true"></div>

      <aside class="portal-rail glass-panel" aria-label="Customer portal navigation">
        <a class="brand-lockup" href="#dashboard" data-page="dashboard" aria-label="Open dashboard overview">
          <span class="brand-mark">TO</span>
          <span>
            <strong>TicketOps</strong>
            <small>Customer Portal</small>
          </span>
        </a>

        <nav class="portal-nav">
          <button class="nav-item is-active" type="button" data-page="dashboard">
            <span>01</span>
            Dashboard
          </button>
          <button class="nav-item" type="button" data-page="orders">
            <span>02</span>
            Orders
          </button>
          <button class="nav-item" type="button" data-page="billing">
            <span>03</span>
            Billing
          </button>
          <button class="nav-item" type="button" data-page="support">
            <span>04</span>
            Support
          </button>
          <button class="nav-item" type="button" data-page="profile">
            <span>05</span>
            Profile
          </button>
        </nav>

        <section class="rail-account" aria-label="Account status">
          <span class="sync-pill"><i></i> Synced 11:42 AM</span>
          <div class="account-card">
            <strong>Aiko Operations</strong>
            <small>Premium service account</small>
          </div>
        </section>
      </aside>

      <main class="portal-main">
        <header class="portal-header glass-panel">
          <div>
            <p class="section-kicker" id="pageEyebrow">Customer command center</p>
            <h1 class="page-title font-display" id="pageTitle">Account Overview</h1>
          </div>

          <label class="search-shell" aria-label="Search account activity">
            <span aria-hidden="true">⌕</span>
            <input type="search" placeholder="Search orders, invoices, tickets" />
          </label>

          <div class="header-actions">
            <button class="btn-secondary" type="button">Export</button>
            <button class="btn-primary" type="button">New request</button>
          </div>
        </header>

        <section class="portal-content" id="customerPage" aria-live="polite"></section>
      </main>
    </div>

    <script src="frontend-config.js"></script>
    <script src="customer.js"></script>
  </body>
</html>
